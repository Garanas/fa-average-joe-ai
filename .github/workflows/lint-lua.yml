name: Lint Lua

on:
    push:
        branches: [main]
        paths:
            - 'lua/**'
            - 'hook/**'
            - '.github/workflows/lint-lua.yml'
    pull_request:
        paths:
            - 'lua/**'
            - 'hook/**'
            - '.github/workflows/lint-lua.yml'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    syntax-check:
        name: Syntax check
        runs-on: ubuntu-latest
        container: faforever/lua:v5.0-1
        steps:
            - name: Install tooling
              run: apk add bash git findutils

            - name: Checkout
              # Pinned to v4 (Node 20) because v5/v6 use Node 24's Alpine binary,
              # which requires a newer musl symbol than faforever/lua:v5.0-1 ships.
              uses: actions/checkout@v4
              with:
                  sparse-checkout: |
                      lua
                      hook

            - name: Syntax check Lua files
              run: find lua hook -type f -name '*.lua' -print0 | xargs -0 -n1 luac -p
