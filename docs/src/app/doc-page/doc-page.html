@if (entry(); as doc) {
    <article class="doc">
        <header class="doc__header">
            <a class="doc__back" routerLink="/">&larr; All documents</a>
            <h1>{{ doc.title }}</h1>
            @if (doc.summary) {
                <p class="doc__summary">{{ doc.summary }}</p>
            }
        </header>
        <markdown class="doc__body prose" [src]="src()!"></markdown>
    </article>
} @else {
    <article class="doc doc--missing">
        <h1>Not found</h1>
        <p>That document doesn't exist. <a routerLink="/">Back to index</a>.</p>
    </article>
}
