@if (entry(); as doc) {
    <article class="mx-auto max-w-3xl px-6 pt-8 pb-16">
        <header class="mb-8 border-b border-border pb-5">
            <a class="mb-4 inline-block text-sm text-muted no-underline hover:text-accent" routerLink="/">&larr; All documents</a>
            <h1>{{ doc.title }}</h1>
            @if (doc.summary) {
                <p class="mt-3 text-[1.0625rem] leading-relaxed text-muted">{{ doc.summary }}</p>
            }
        </header>
        <markdown class="prose" [src]="src()!"></markdown>
    </article>
} @else {
    <article class="mx-auto max-w-3xl px-6 pt-8 pb-16 text-center">
        <h1>Not found</h1>
        <p>That document doesn't exist. <a routerLink="/">Back to index</a>.</p>
    </article>
}
